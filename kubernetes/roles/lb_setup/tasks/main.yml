---
- name: Install HAProxy
  ansible.builtin.apt:
    name: haproxy
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable and start HAProxy
  ansible.builtin.service:
    name: haproxy
    enabled: true
    state: started

- name: Set control plane node IPs
  ansible.builtin.set_fact:
    control_plane_ips: "{{ control_plane_ips | default([]) + [ hostvars[item]['ansible_host'] ] }}"
  loop: "{{ groups['control_plane_nodes'] }}"

- name: Configure backend endpoints
  ansible.builtin.set_fact:
    haproxy_backend_servers: |
      {% for ip in control_plane_ips %}
             server control-{{ loop.index }} {{ ip }}:6443 check
      {% endfor %}

- name: Configure HAProxy
  ansible.builtin.blockinfile:
    path: /etc/haproxy/haproxy.cfg
    prepend_newline: true
    block: |

      frontend fe-apiserver
         bind 0.0.0.0:6443
         mode tcp
         option tcplog
         default_backend be-apiserver

      backend be-apiserver
         mode tcp
         option tcplog
         option tcp-check
         balance roundrobin
         default-server inter 10s downinter 5s rise 2 fall 2 slowstart 60s maxconn 250 maxqueue 256 weight 100

      {{ haproxy_backend_servers }}
  notify: restart haproxy

# Install kubectl

- debug:
    var: install_kubectl

- block:
  - name: Install dependencies for adding repository
    ansible.builtin.package:
      name:
        - ca-certificates
        - curl
        - apt-transport-https
        - gpg
      state: present
      update_cache: yes
      cache_valid_time: 3600

  - name: Ensure keyrings directory exists
    ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: '0755'

  - name: Add Kubernetes official repository
    ansible.builtin.deb822_repository:
      name: kubernetes
      types: [deb]
      uris: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/"
      suites: /
      signed_by: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/Release.key"
      state: present

  - name: Install kubectl
    ansible.builtin.apt:
      name:
        - kubectl
      state: present
      update_cache: yes
    register: pkg_install

  when: install_kubectl

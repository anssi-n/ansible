- name: Get pending CSR names
  ansible.builtin.command:
    cmd:
      "kubectl get csr --field-selector spec.signerName=kubernetes.io/kubelet-serving --no-headers \
      -o custom-columns=NAME:.metadata.name"
  register: request_kubelet_serving_cert_csr_output
  delegate_to: "{{ request_kubelet_serving_cert_primary_control_plane_node }}"
  run_once: true
  changed_when: false
  listen: "approve pending csr"


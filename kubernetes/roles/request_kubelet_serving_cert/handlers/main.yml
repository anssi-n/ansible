- name: Approve CSRs
  ansible.builtin.command:
    cmd: "kubectl certificate approve {{ item }}"
  delegate_to: "{{ request_kubelet_serving_cert_primary_control_plane_node }}"
  run_once: true
  changed_when: false
  loop: "{{ request_kubelet_serving_cert_csr_output.stdout_lines }}"
  listen: "approve pending csr"

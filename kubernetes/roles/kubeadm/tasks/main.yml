---
# Disable swap

- name: Disable swap for current session
  command: swapoff -a
  when: ansible_facts["swaptotal_mb"] > 0

- name: Disable swap permanently
  replace:
    path: /etc/fstab
    regexp: '^(\s*)([^#\n]+\s+)(\w+\s+)swap(\s+.*)$'
    replace: '#\1\2\3swap\4'
    backup: yes
  when: ansible_facts["swaptotal_mb"] > 0

# Load required kernel modules

- name: Load overlay kernel module
  community.general.modprobe:
    name: overlay
    state: present
    persistent: present

- name: Load br_netfilter kernel module
  community.general.modprobe:
    name: br_netfilter
    state: present
    persistent: present

# Set required kernel parameters

- name: Set net.bridge.bridge-nf-call-iptables
  ansible.posix.sysctl:
    name: net.bridge.bridge-nf-call-iptables
    value: '1'
    state: present

- name: Set net.bridge.bridge-nf-call-iptables
  ansible.posix.sysctl:
    name: net.bridge.bridge-nf-call-ip6tables
    value: '1'
    state: present

- name: Set net.bridge.bridge-nf-call-iptables
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present

# Install kubeadm, kubelet and kubectl

- name: Install dependencies for adding repository
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - apt-transport-https
      - gpg
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Kubernetes official repository
  ansible.builtin.deb822_repository:
    name: kubernetes
    types: [deb]
    uris: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/"
    suites: /
    signed_by: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/Release.key"
    state: present

- name: Install kubeadm, kubelet and kubectl
  ansible.builtin.apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present
    update_cache: yes
  register: pkg_install

- name: Set was_installed variable
  ansible.builtin.set_fact:
    kubeadm_installed: "{{ pkg_install.changed }}"

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Enable and start kubelet
  ansible.builtin.service:
    name: kubelet
    state: started
    enabled: true

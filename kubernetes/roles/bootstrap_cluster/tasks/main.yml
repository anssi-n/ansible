---
- name: Ensure github pat is provided
  ansible.builtin.fail:
    msg: Github PAT must be provided in bootstrap_cluster_github_pat variable
  when: bootstrap_cluster_github_pat is not defined

- name: Check if flux-system namespace exists
  ansible.builtin.command:
    cmd: kubectl get ns flux-system --ignore-not-found
  changed_when: false
  register: bootstrap_cluster_fluxcd_ns

- name: Set cluster Check if cluster if already bootstrapped
  ansible.builtin.set_fact:
    bootstrap_cluster_bootstrapped: "{{ (bootstrap_cluster_fluxcd_ns.stdout != '') | bool }}"

- name: Bootstrap cluster
  when: not bootstrap_cluster_bootstrapped
  block:
    - name: Bootrap cluster
      ansible.builtin.command:
        cmd: >
          flux bootstrap github
          --owner="{{ bootstrap_cluster_github_owner }}"
          --repository="{{ bootstrap_cluster_github_repository }}"
          --private=false
          --personal=true
          --path="{{ bootstrap_cluster_github_repository_path }}"
      changed_when: false
      timeout: "{{ bootstrap_cluster_timeout }}"
      register: bootstrap_cluster_result
      environment:
        GITHUB_TOKEN: "{{ bootstrap_cluster_github_pat }}"

---
- name: Check if cilium is already installed
  ansible.builtin.stat:
    path: "{{ cilium_cli_target_dir }}/cilium"
  register: cilium_installed

- name: Install cilium
  when: not cilium_installed.stat.exists
  block:
    - name: Check cilium cli version
      ansible.builtin.uri:
        url: https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt
        return_content: true
      register: cilium_cli_version

    - name: Download cilium cli plugings
      ansible.builtin.get_url:
        url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_version.content | trim }}/cilium-linux-amd64.tar.gz"
        dest: "/tmp/cilium-linux-amd64.tar.gz"
        owner: root
        group: root
        mode: "0755"
        checksum: "sha256:https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_version.content | trim }}/cilium-linux-amd64.tar.gz.sha256sum"

    - name: Install cilium cli
      ansible.builtin.unarchive:
        src: "/tmp/cilium-linux-amd64.tar.gz"
        dest: "{{ cilium_cli_target_dir }}"
        copy: false
        creates: "{{ cilium_cli_target_dir }}/cilium"

    - name: Install cilium
      ansible.builtin.command:
        cmd: cilium install
      changed_when: false

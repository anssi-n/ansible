---
- name: Check if join command is already executed
  ansible.builtin.stat:
    path: /etc/kubernetes/pki
  register: join_worker_joined

- name: Set primary control plane node
  ansible.builtin.set_fact:
    join_worker_primary_control_plane_node: "{{ groups['control_plane_nodes'] | first }}"

- name: Join worker node
  when: not ( join_worker_joined.stat.isdir is defined and join_worker_joined.stat.isdir )
  block:
    - name: Get join command from primary control plane node
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: join_worker_join_command_output
      delegate_to: "{{ join_worker_primary_control_plane_node }}"
      changed_when: false
      run_once: true

    - name: Get join command for worker nodes
      ansible.builtin.set_fact:
        join_worker_command: "{{ join_worker_join_command_output.stdout }}"
      run_once: true

    - name: Get parameters from join command
      ansible.builtin.set_fact:
        join_worker_join_token: "{{ (join_worker_command | split)[4] | trim }}"
        join_worker_api_server_endpoint: "{{ (join_worker_command | split)[2] | trim }}"
        join_worker_ca_cert_hash: "{{ (join_worker_command | split)[6] | trim }}"

    - name: Create join config file
      ansible.builtin.template:
        src: kubeadm-join-config-template.j2
        dest: /tmp/kubeadm-join-config.yaml
        owner: root
        group: root
        mode: "0755"

    - name: Join worker node
      ansible.builtin.command:
        cmd: kubeadm join --config /tmp/kubeadm-join-config.yaml
        creates: /etc/kubernetes/pki
      register: join_worker_output
